<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PoultryGuard v1.7 - Secure Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #f8fafc; color: #1e293b; }
        .btn-press:active { transform: scale(0.92); }
        .transition-soft { transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        .status-pulse { animation: pulse 2s infinite; }
        @keyframes pulse { 0%, 100% { transform: scale(1); opacity: 1; } 50% { transform: scale(1.05); opacity: 0.7; } }
        .btn-off { background-color: #f1f5f9; color: #94a3b8; border: 1px solid #e2e8f0; }
        .btn-on { background-color: #2563eb; color: #ffffff; border: 1px solid #2563eb; box-shadow: 0 10px 20px -5px rgba(37, 99, 235, 0.4); }
        .hidden-page { display: none !important; }
    </style>
</head>
<body class="p-4 md:p-10">

    <div id="login-page" class="flex items-center justify-center min-h-[80vh]">
        <div class="bg-white p-10 rounded-[2.5rem] shadow-xl border border-slate-100 w-full max-w-md">
            <div class="text-center mb-10">
                <div class="w-16 h-16 bg-blue-600 rounded-2xl mx-auto mb-4 flex items-center justify-center shadow-lg shadow-blue-100">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-8 w-8 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z" /></svg>
                </div>
                <h2 class="text-2xl font-extrabold text-slate-900">Poultry<span class="text-blue-600">Guard</span></h2>
                <p class="text-slate-400 text-[10px] font-bold uppercase tracking-[0.2em] mt-2 text-center">Admin Access Only</p>
            </div>
            
            <div class="space-y-4">
                <input type="text" id="username" placeholder="Username" class="w-full px-6 py-4 bg-slate-50 border border-slate-100 rounded-2xl focus:outline-none focus:ring-2 focus:ring-blue-500 transition-all font-bold text-slate-700">
                <input type="password" id="password" placeholder="Password" class="w-full px-6 py-4 bg-slate-50 border border-slate-100 rounded-2xl focus:outline-none focus:ring-2 focus:ring-blue-500 transition-all font-bold text-slate-700">
                <button onclick="handleLogin()" class="w-full py-4 bg-blue-600 text-white rounded-2xl font-black shadow-lg shadow-blue-100 hover:bg-blue-700 active:scale-95 transition-all tracking-widest text-xs">LOGIN SYSTEM</button>
            </div>
            <p id="error-msg" class="text-rose-500 text-[10px] font-black mt-6 text-center uppercase tracking-widest hidden">Akses Ditolak! Cek Username & PW</p>
        </div>
    </div>

    <div id="dashboard-page" class="max-w-6xl mx-auto hidden-page">
        <header class="flex justify-between items-center mb-10">
            <div>
                <h1 class="text-3xl font-extrabold tracking-tight">Poultry<span class="text-blue-600">Guard</span></h1>
                <p class="text-slate-500 font-medium text-xs tracking-widest uppercase">Safety Insight v1.7</p>
            </div>
            <button onclick="handleLogout()" class="px-5 py-2 bg-white text-slate-400 text-[10px] font-black uppercase rounded-xl border border-slate-100 hover:text-rose-500 transition-all">Logout</button>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-4 gap-6">
            <div class="lg:col-span-2 bg-white p-10 rounded-[2.5rem] shadow-sm border border-slate-50 flex flex-col justify-center relative overflow-hidden">
                <div class="absolute top-0 right-0 p-8">
                    <span id="amonia-badge" class="px-4 py-1.5 bg-emerald-50 text-emerald-600 rounded-xl text-[10px] font-black border border-emerald-100 uppercase tracking-widest">Normal</span>
                </div>
                <h2 class="text-slate-400 font-bold text-[10px] uppercase tracking-[0.2em] mb-4">Kadar Amonia (NH3)</h2>
                <div class="flex items-baseline gap-2">
                    <span id="amonia-val" class="text-9xl font-black text-slate-900 tracking-tighter">0.0</span>
                    <span class="text-3xl font-bold text-slate-300 uppercase">Ppm</span>
                </div>
            </div>

            <div class="lg:col-span-1 bg-white p-8 rounded-[2.5rem] shadow-sm border border-slate-100 flex flex-col">
                <h3 class="text-[10px] font-black text-slate-400 uppercase tracking-widest text-center mb-4">Keadaan Ayam</h3>
                <div class="bg-blue-50/50 p-4 rounded-2xl border border-blue-100 mb-6 text-center">
                    <p class="text-[10px] text-blue-700 italic font-medium leading-relaxed">Safety Protocol: Spray ditunda jika ada ayam.</p>
                </div>
                <div class="space-y-4">
                    <div id="pir1-status-box" class="flex items-center justify-between p-4 bg-slate-50 rounded-2xl border border-slate-50">
                        <span class="text-xs font-bold text-slate-500">PIR 1</span>
                        <span id="pir1-text" class="text-[10px] font-black text-slate-400 uppercase">Clear</span>
                    </div>
                    <div id="pir2-status-box" class="flex items-center justify-between p-4 bg-slate-50 rounded-2xl border border-slate-50">
                        <span class="text-xs font-bold text-slate-500">PIR 2</span>
                        <span id="pir2-text" class="text-[10px] font-black text-slate-400 uppercase">Clear</span>
                    </div>
                </div>
            </div>

            <div class="lg:col-span-1 bg-white p-8 rounded-[2.5rem] shadow-sm border border-slate-100 flex flex-col justify-center">
                <h3 class="text-[10px] font-black text-slate-400 uppercase tracking-widest text-center mb-6">Mode</h3>
                <div class="bg-slate-50 p-1.5 rounded-2xl flex flex-col gap-2">
                    <button id="mode-auto" onclick="setMode('auto')" class="w-full py-4 rounded-xl text-[10px] font-black transition-soft bg-blue-600 text-white shadow-lg shadow-blue-100 btn-press">OTOMATIS</button>
                    <button id="mode-manual" onclick="setMode('manual')" class="w-full py-4 rounded-xl text-[10px] font-black transition-soft text-slate-400 hover:text-slate-600 btn-press">MANUAL</button>
                </div>
            </div>

            <div id="manual-controls" class="lg:col-span-1 bg-white p-8 rounded-[2.5rem] shadow-sm border border-slate-100 opacity-20 pointer-events-none transition-soft flex flex-col justify-center">
                <h3 id="control-label" class="text-[10px] font-bold text-slate-300 uppercase tracking-widest mb-8 text-center">Locked</h3>
                <div class="flex flex-col gap-4">
                    <button id="btn-pintu" onclick="toggleControl('pintu')" class="btn-off p-6 rounded-[2rem] flex flex-col items-center gap-1 transition-soft btn-press">
                        <span class="text-[11px] font-black uppercase">Pintu Kandang</span>
                        <span class="text-[9px] font-bold uppercase tracking-wider">Off / Standby</span>
                    </button>
                    <button id="btn-pompa" onclick="toggleControl('pompa')" class="btn-off p-6 rounded-[2rem] flex flex-col items-center gap-1 transition-soft btn-press">
                        <span class="text-[11px] font-black uppercase">Pompa Spray</span>
                        <span class="text-[9px] font-bold uppercase tracking-wider">Off / Standby</span>
                    </button>
                </div>
            </div>

            <div class="lg:col-span-3 bg-white rounded-[2.5rem] shadow-sm border border-slate-100 overflow-hidden">
                <div class="px-8 py-6 border-b border-slate-50 flex justify-between items-center">
                    <h3 class="font-bold text-slate-800 text-sm uppercase tracking-widest">Aktivitas Terbaru</h3>
                </div>
                <div class="overflow-x-auto">
                    <table class="w-full text-left">
                        <tbody id="log-table-body" class="text-[11px] font-bold text-slate-600 divide-y divide-slate-50">
                            <tr><td class="px-8 py-5 text-slate-400 italic text-center">Menunggu data masuk...</td></tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <script>
        // --- DATA LOGIN CUSTOM ---
        const ADMIN_USER = "admin";
        const ADMIN_PASS = "admin";

        // --- CEK STATUS LOGIN SAAT DIBUKA ---
        document.addEventListener('DOMContentLoaded', () => {
            const isLoggedIn = localStorage.getItem('isLoggedIn');
            if(isLoggedIn === 'true') {
                showDashboard();
            }
        });

        function handleLogin() {
            const user = document.getElementById('username').value;
            const pass = document.getElementById('password').value;
            const error = document.getElementById('error-msg');

            if(user === ADMIN_USER && pass === ADMIN_PASS) {
                localStorage.setItem('isLoggedIn', 'true');
                showDashboard();
            } else {
                error.classList.remove('hidden');
                setTimeout(() => error.classList.add('hidden'), 3000);
            }
        }

        function showDashboard() {
            document.getElementById('login-page').classList.add('hidden-page');
            document.getElementById('dashboard-page').classList.remove('hidden-page');
        }

        function handleLogout() {
            localStorage.removeItem('isLoggedIn');
            location.reload();
        }

        // --- LOGIKA DASHBOARD (SAMA SEPERTI SEBELUMNYA) ---
        let deviceStates = { pintu: false, pompa: false };

        function setMode(mode) {
            const btnAuto = document.getElementById('mode-auto');
            const btnManual = document.getElementById('mode-manual');
            const controlBox = document.getElementById('manual-controls');
            const controlLabel = document.getElementById('control-label');

            if(mode === 'auto') {
                btnAuto.className = "w-full py-4 rounded-xl text-[10px] font-black transition-soft bg-blue-600 text-white shadow-lg btn-press";
                btnManual.className = "w-full py-4 rounded-xl text-[10px] font-black transition-soft text-slate-400 btn-press";
                controlBox.classList.add('opacity-20', 'pointer-events-none');
                controlLabel.innerText = "Locked";
            } else {
                btnManual.className = "w-full py-4 rounded-xl text-[10px] font-black transition-soft bg-blue-600 text-white shadow-lg btn-press";
                btnAuto.className = "w-full py-4 rounded-xl text-[10px] font-black transition-soft text-slate-400 btn-press";
                controlBox.classList.remove('opacity-20', 'pointer-events-none');
                controlLabel.innerText = "Ready to Control";
            }
        }

        function toggleControl(device) {
            deviceStates[device] = !deviceStates[device];
            const btn = document.getElementById(`btn-${device}`);
            const label = btn.querySelector('span:last-child');
            
            if(deviceStates[device]) {
                btn.className = "btn-on p-6 rounded-[2rem] flex flex-col items-center gap-1 transition-soft btn-press scale-105 shadow-xl";
                label.innerText = "Active / On";
            } else {
                btn.className = "btn-off p-6 rounded-[2rem] flex flex-col items-center gap-1 transition-soft btn-press scale-100 shadow-sm";
                label.innerText = "Off / Standby";
            }
        }

        function updatePIR(id, detected) {
            const box = document.getElementById(`pir${id}-status-box`);
            const txt = document.getElementById(`pir${id}-text`);
            if(detected) {
                box.className = "flex items-center justify-between p-4 bg-rose-50 rounded-2xl border border-rose-100";
                txt.innerText = "DETECTED"; txt.className = "text-[10px] font-black text-rose-600 status-pulse";
            } else {
                box.className = "flex items-center justify-between p-4 bg-emerald-50 rounded-2xl border border-emerald-100";
                txt.innerText = "CLEAR"; txt.className = "text-[10px] font-black text-emerald-600";
            }
        }

        setInterval(() => {
            const val = (Math.random() * (40 - 5) + 5).toFixed(1);
            document.getElementById('amonia-val').innerText = val;
            const badge = document.getElementById('amonia-badge');
            if(val > 25) { badge.className = "px-4 py-1.5 bg-rose-50 text-rose-600 rounded-xl text-[10px] font-black border border-rose-100 animate-bounce"; badge.innerText = "Warning!"; }
            else { badge.className = "px-4 py-1.5 bg-emerald-50 text-emerald-600 rounded-xl text-[10px] font-black border border-emerald-100 uppercase"; badge.innerText = "Aman"; }
        }, 3000);

        setInterval(() => { updatePIR(1, Math.random() > 0.8); updatePIR(2, Math.random() > 0.8); }, 5000);
    </script>
</body>
</html>
